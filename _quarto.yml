project:
  type: website
  output-dir: _site
  render:
    # index.qmd, bear_cub.qmd, goldbug.qmd moved out (-> portfolio umbrella,
    # bearcub, gldbg respectively). The public chapter site at /ai-minerals/ is
    # superseded by the portfolio umbrella; the chapters below stay here as the
    # source the umbrella {{< include >}}s, and render standalone for local preview.
    # NOTE (cutover): decide whether ai-minerals still deploys this public site at
    # all once the umbrella owns /ai-minerals/ — see deploy_to_hostinger.sh.
    - regional.qmd
    - reproductions.qmd
    - cross_region.qmd
    - drill_planning.qmd
    - posts.qmd
    - posts/*/index.qmd

website:
  title: "ai-minerals"
  description: "Mineral prospectivity mapping on public open data"
  site-url: https://johnsondevco.com/ai-minerals/
  favicon: favicon.png
  repo-url: https://github.com/00skyking00/ai-minerals
  navbar:
    left:
      # Portfolio home (index.qmd) now lives in the portfolio umbrella.
      # "1. Bear Cub" -> bearcub repo (/bearcub/); "3. goldbug" -> gldbg (/goldbug/).
      - href: regional.qmd
        text: "2. Regional MPM"
      - href: reproductions.qmd
        text: "4. Reproductions + audits"
      - href: cross_region.qmd
        text: "5. Cross-region"
      - href: drill_planning.qmd
        text: "6. Drill planning"
      # Hidden until first note lands. The page itself still renders.
      # - href: posts.qmd
      #   text: "Notes"

format:
  html:
    theme:
      - sandstone
      - custom.scss
    toc: true
    code-fold: false
    code-tools: true

execute:
  freeze: auto
