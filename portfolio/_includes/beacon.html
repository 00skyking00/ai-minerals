<!-- Visit beacon: one CSV row per page-load to public_html/_visits/.
     Built at runtime so the URL matches whatever site prefix the page lives
     under (/ai-minerals/ vs /ai-minerals-beta/, any nesting depth). -->
<script>
(function () {
  var m = window.location.pathname.match(/^\/([^\/]+)\//);
  if (!m) return;
  var img = new Image(1, 1);
  img.style.cssText = "position:absolute;left:-9999px;width:1px;height:1px;border:0;opacity:0";
  img.referrerPolicy = "no-referrer-when-downgrade";
  img.src = "/" + m[1] + "/beacon.php?t=" + Date.now();
  document.body.appendChild(img);
})();
</script>
