project:
  type: website
  output-dir: _site
  resources:
    # beacon.php is a tracking pixel. Quarto copies it verbatim into _site/
    # so the deploy script's rsync ships it to public_html/ai-minerals/.
    - beacon.php
  render:
    # ai-minerals deploys a single site at /ai-minerals/. The chapter pages
    # are the front door; the deep-review notebooks (per-region notebooks/
    # subdirs) render under /ai-minerals/notebooks/<region>/<page>.html and
    # are reachable by direct URL even though they aren't surfaced in the
    # chapter-level navbar. (Was split into _quarto-internal.yml until
    # 2026-05-31; the internal site was decommissioned and folded back here
    # for a single-deploy story. Beta deploys go to /ai-minerals-beta/ via
    # `bash scripts/deploy_to_hostinger.sh ai-minerals-beta`.)
    - index.qmd
    - regional.qmd
    - placer.qmd
    - reproductions.qmd
    - cross_region.qmd
    - drill_planning.qmd
    - posts.qmd
    - posts/*/index.qmd
    # Deep-review notebooks (one folder per region).
    - notebooks/eastak/*.qmd
    - notebooks/bcgt/*.qmd
    - notebooks/motherlode/*.qmd
    - notebooks/arizona/*.qmd
    - notebooks/northern_sierra_placer/*.qmd
    - notebooks/cross_region/*.qmd
    - notebooks/drill_planning/*.qmd
    - notebooks/prospectus/*.qmd

website:
  title: "ai-minerals"
  description: "Mineral prospectivity mapping on public open data"
  site-url: https://johnsondevco.com/ai-minerals/
  favicon: favicon.png
  repo-url: https://github.com/00skyking00/ai-minerals
  navbar:
    left:
      # Bear Cub + goldbug are cross-site links (their own repos own /bearcub/ + /goldbug/).
      - href: index.qmd
        text: Portfolio
      - href: https://johnsondevco.com/bearcub/bear_cub.html
        text: "1. Bear Cub"
      - href: regional.qmd
        text: "2. Regional MPM"
      - href: https://johnsondevco.com/goldbug/goldbug.html
        text: "3. goldbug"
      - href: placer.qmd
        text: "4. Placer"
      - href: reproductions.qmd
        text: "5. Reproductions + audits"
      - href: cross_region.qmd
        text: "6. Cross-region"
      - href: drill_planning.qmd
        text: "7. Drill planning"
      # Hidden until first note lands. The page itself still renders.
      # - href: posts.qmd
      #   text: "Notes"

format:
  html:
    theme:
      - sandstone
      - custom.scss
    toc: true
    code-fold: false
    code-tools: true
    include-after-body: _includes/beacon.html

execute:
  freeze: auto
