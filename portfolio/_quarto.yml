project:
  type: website
  output-dir: _site
  resources:
    # beacon.php is a tracking pixel. Quarto copies it verbatim into _site/
    # so the deploy script's rsync ships it to public_html/ai-minerals/.
    - beacon.php
  render:
    # ai-minerals deploys a single site at /ai-minerals/. The chapter pages
    # are the front door; the deep-review notebooks (per-region notebooks/
    # subdirs) render under /ai-minerals/notebooks/<region>/<page>.html and
    # are reachable by direct URL even though they aren't surfaced in the
    # chapter-level navbar. (Was split into _quarto-internal.yml until
    # 2026-05-31; the internal site was decommissioned and folded back here
    # for a single-deploy story. Beta deploys go to /ai-minerals-beta/ via
    # `bash scripts/deploy_to_hostinger.sh ai-minerals-beta`.)
    - index.qmd
    - regional.qmd
    - placer.qmd
    - reproductions.qmd
    - cross_region.qmd
    - drill_planning.qmd
    - references.qmd
    - posts.qmd
    - posts/*/index.qmd
    # Deep-review notebooks. Listed explicitly (not globbed) so retired or
    # superseded notebooks under each region stay un-rendered. To restore a
    # dropped notebook, add it back here.
    - notebooks/eastak/data_exploration.qmd
    - notebooks/eastak/eastak_porphyry_prospectivity.qmd
    - notebooks/bcgt/data_exploration.qmd
    - notebooks/bcgt/validation.qmd
    - notebooks/bcgt/decision_planning.qmd
    - notebooks/bcgt/bcgt_porphyry_prospectivity.qmd
    - notebooks/motherlode/data_exploration.qmd
    - notebooks/motherlode/v3p1_improvements.qmd
    - notebooks/arizona/*.qmd
    # northern_sierra_placer: the three v2-era internal qmds (data_exploration,
    # internal, northern_sierra_placer_prospectivity) and the v3 phase notebooks
    # under v3/ are review-only artifacts; the public overview is data_overview.qmd.
    - notebooks/northern_sierra_placer/data_overview.qmd
    - notebooks/cross_region/four_cell.qmd
    - notebooks/prospectus/deep_seam_audit.qmd
    - notebooks/prospectus/us_carbonatite_ree.qmd

website:
  title: "ai-minerals"
  description: "Mineral prospectivity mapping on public open data"
  site-url: https://johnsondevco.com/ai-minerals/
  favicon: favicon.png
  repo-url: https://github.com/00skyking00/ai-minerals
  navbar:
    left:
      # Bear Cub + goldbug are cross-site links (their own repos own /bearcub/ + /goldbug/).
      # Brand "ai-minerals" links to index.qmd, so no separate Portfolio link.
      - href: https://johnsondevco.com/bearcub/bear_cub.html
        text: "1. Bear Cub"
      - href: regional.qmd
        text: "2. Regional MPM"
      - href: https://johnsondevco.com/goldbug/goldbug.html
        text: "3. goldbug"
      - href: placer.qmd
        text: "4. Placer"
      - href: reproductions.qmd
        text: "5. Reproductions + audits"
      - href: cross_region.qmd
        text: "6. Cross-region"
      - href: drill_planning.qmd
        text: "7. Drill planning"
      # Hidden until first note lands. The page itself still renders.
      # - href: posts.qmd
      #   text: "Notes"
  sidebar:
    # One floating sidebar per chapter with deeper notebooks. Quarto picks
    # the sidebar whose id matches the current page's section; floating
    # style keeps the sidebar out of the way on chapter pages that don't
    # reference it.
    - id: regional
      title: "Regional MPM notebooks"
      style: "floating"
      align: left
      contents:
        - notebooks/eastak/eastak_porphyry_prospectivity.qmd
        - notebooks/eastak/data_exploration.qmd
        - notebooks/bcgt/bcgt_porphyry_prospectivity.qmd
        - notebooks/bcgt/data_exploration.qmd
        - notebooks/bcgt/validation.qmd
        - notebooks/bcgt/decision_planning.qmd
        - notebooks/motherlode/data_exploration.qmd
        - notebooks/motherlode/v3p1_improvements.qmd
        - notebooks/arizona/main.qmd
    - id: placer
      title: "Placer notebooks"
      style: "floating"
      align: left
      contents:
        - notebooks/northern_sierra_placer/data_overview.qmd
    - id: reproductions
      title: "Reproductions + audits notebooks"
      style: "floating"
      align: left
      contents:
        - notebooks/prospectus/deep_seam_audit.qmd
    - id: cross_region
      title: "Cross-region notebooks"
      style: "floating"
      align: left
      contents:
        - notebooks/cross_region/four_cell.qmd
        - notebooks/prospectus/us_carbonatite_ree.qmd
    - id: drill_planning
      title: "Drill planning notebooks"
      style: "floating"
      align: left
      contents:
        - notebooks/bcgt/decision_planning.qmd

format:
  html:
    theme:
      - sandstone
      - custom.scss
    toc: true
    code-fold: false
    code-tools: true
    include-after-body: _includes/beacon.html

execute:
  freeze: auto
